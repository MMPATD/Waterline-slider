<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waterline Slider</title>

  <style>
    :root {
      --reveal: 40%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    .instruction {
      text-align: center;
      color: #d7763c;
      font-style: italic;
      margin-bottom: 12px;
    }

    .image-wrapper {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
    }

    .base {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Full overlay layer */
    .overlay-layer {
      position: absolute;
      inset: 0;
      background: url("iceberg-overlay.png") top center / 100% 100% no-repeat;
      clip-path: inset(0 0 calc(100% - var(--reveal)) 0);
      z-index: 2;
      pointer-events: none;
    }

    /* Waterline shimmer */
    .waterline {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(var(--reveal) - 3px);
      height: 6px;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .waterline::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.85) 50%,
        rgba(255,255,255,0) 100%
      );
      filter: blur(1px);
      opacity: 0.85;
      animation: shimmer 3s linear infinite;
      transform: translateX(-50%);
    }

    @keyframes shimmer {
      from {
        transform: translateX(-50%);
      }
      to {
        transform: translateX(50%);
      }
    }

    /* Custom slider */
    .slider {
      position: absolute;
      top: 12px;
      bottom: 12px;
      right: 12px;
      width: 28px;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .slider-track {
      position: relative;
      width: 6px;
      height: 100%;
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .slider-thumb {
      position: absolute;
      left: 50%;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #222;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transform: translate(-50%, -50%);
      cursor: grab;
      touch-action: none;
    }

    .slider-thumb:active {
      cursor: grabbing;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="instruction">
      Drag the slider to reveal more details.
    </div>

    <div class="image-wrapper" id="wrapper">
      <img src="iceberg-base.png" class="base" alt="Iceberg image" />

      <div class="overlay-layer" id="overlayLayer"></div>
      <div class="waterline" id="waterline"></div>

      <div class="slider" aria-label="Reveal slider">
        <div class="slider-track" id="sliderTrack">
          <div class="slider-thumb" id="sliderThumb"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    <script>
  window.addEventListener("load", () => {
    const wrapper = document.getElementById("wrapper");
    const track = document.getElementById("sliderTrack");
    const thumb = document.getElementById("sliderThumb");
    const baseImage = wrapper.querySelector(".base");
    const root = document.documentElement;

    let value = 40; // starting reveal percentage
    let dragging = false;

    function setReveal(percent) {
  value = Math.max(0, Math.min(100, percent));
  root.style.setProperty("--reveal", value + "%");

  const trackHeight = track.clientHeight;
  const thumbHeight = thumb.offsetHeight;

  const thumbY = (value / 100) * trackHeight - (thumbHeight / 2);

  thumb.style.top = `${thumbY}px`;
}
``
    }

    function updateFromPointer(clientY) {
      const rect = track.getBoundingClientRect();
      const y = clientY - rect.top;
      const percent = (y / rect.height) * 100;
      setReveal(percent);
    }

    thumb.addEventListener("pointerdown", (e) => {
      dragging = true;
      thumb.setPointerCapture(e.pointerId);
    });

    window.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      updateFromPointer(e.clientY);
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
    });

    track.addEventListener("click", (e) => {
      updateFromPointer(e.clientY);
    });

    window.addEventListener("resize", () => {
      setReveal(value);
    });

    // If image is already loaded, set immediately
    if (baseImage.complete) {
      setReveal(value);
    } else {
      baseImage.addEventListener("load", () => setReveal(value));
    }
  });
</script>
  </script>

</body>
</html>
