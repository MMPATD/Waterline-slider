<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waterline Slider</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  .container {
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
  }

  .instruction {
    text-align: center;
    color: #d7763c;
    font-style: italic;
    margin-bottom: 12px;
  }

  .image-wrapper {
    position: relative;
    overflow: hidden;
    border-radius: 10px;
  }

  img.base {
    width: 100%;
    display: block;
  }

  /* Overlay reveal */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    z-index: 5;
  }

  .overlay img {
   
position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

  /* Soft gradient "waterline" edge */
  .overlay::after {
    content: "";
    position: absolute;
    bottom: -20px;
    left: 0;
    width: 100%;
    height: 40px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.0), rgba(255,255,255,0.6));
    pointer-events: none;
  }

  /* Slider container */
  .slider {
    position: absolute;
    right: 10px;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    z-index: 20;
  }
  
input[type="range"] {
  position: relative;
  z-index: 11;
}

  input[type="range"] {
    writing-mode: vertical-lr;
    appearance: none;
    width: 12px;
    height: 100%;
    background: transparent;
  }

  /* Track */
  input[type="range"]::-webkit-slider-runnable-track {
    width: 6px;
    background: #999;
    border-radius: 3px;
  }

  /* Thumb */
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #222;
    cursor: grab;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  input[type="range"]:active::-webkit-slider-thumb {
    cursor: grabbing;
    transform: scale(1.1);
  }
</style>
</head>

<body>

<div class="container">

  <div class="instruction">
    Click on the slider and drag it down to reveal more details.
  </div>

  <div class="image-wrapper">

    <!-- Fully visible image -->
    <img src="iceberg-base.png" class="base" alt="Iceberg image">

    <!-- Hidden overlay -->
    <div class="overlay" id="overlay">
      <img src="iceberg-overlay.png" alt="Revealed details">
    </div>

    <!-- Slider -->
    <div class="slider">
      <input 
        type="range" 
        min="0" 
        max="100" 
        value="0"
        id="slider"
      >
    </div>

  </div>

</div>

<script>
  const slider = document.getElementById("slider");
  const overlay = document.getElementById("overlay");

  slider.addEventListener("input", () => {
    requestAnimationFrame(() => {
      overlay.style.height = slider.value + "%";
    });
  });
</script>

</body>
</html>
